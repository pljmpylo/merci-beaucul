<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;600&display=swap" rel="stylesheet">

<div style="font-family:'Raleway',sans-serif;max-width:560px;margin:0 auto;padding:40px 24px;background:#FFFAFD;border-radius:24px;">

  <!-- Titre -->
  <div style="text-align:center;margin-bottom:36px;">
    <p style="font-size:11px;font-weight:600;letter-spacing:0.30em;text-transform:uppercase;color:#DC143C;margin:0 0 12px 0;">Exercice de respiration</p>
    <h2 style="font-size:28px;font-weight:200;color:#450100;margin:0 0 16px 0;line-height:1.3;">La respiration carrée</h2>
    <p style="font-size:14px;font-weight:300;color:#561930;line-height:1.7;margin:0;opacity:0.8;">
      Suis le trait qui se déplace le long du carré.<br>
      Inspire, bloque, expire, bloque — 4 secondes chacun.
    </p>
  </div>

  <!-- Animation -->
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div id="phase-label" style="font-size:12px;font-weight:600;letter-spacing:0.30em;text-transform:uppercase;margin-bottom:28px;color:#8A1B1A;transition:color 0.7s;">Inspire</div>

    <div style="position:relative;width:260px;height:260px;">
      <div style="position:absolute;inset:0;border-radius:36px;background:#FFFFFF;box-shadow:0 2px 28px rgba(86,25,48,0.07);"></div>
      <canvas id="rsp-cv" width="260" height="260" style="position:absolute;top:0;left:0;"></canvas>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;">
        <div id="rsp-num" style="font-size:48px;font-weight:200;line-height:1;color:#8A1B1A;transition:color 0.7s;">4</div>
        <div style="font-size:10px;font-weight:400;letter-spacing:0.22em;text-transform:uppercase;margin-top:4px;color:#561930;opacity:0.5;">secondes</div>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:22px;" id="rsp-dots">
      <div class="rsp-dot" style="width:7px;height:7px;border-radius:50%;background:#8A1B1A;opacity:1;transition:opacity 0.4s,background 0.5s;"></div>
      <div class="rsp-dot" style="width:7px;height:7px;border-radius:50%;background:#FFDE59;opacity:0.18;transition:opacity 0.4s,background 0.5s;"></div>
      <div class="rsp-dot" style="width:7px;height:7px;border-radius:50%;background:#DC143C;opacity:0.18;transition:opacity 0.4s,background 0.5s;"></div>
      <div class="rsp-dot" style="width:7px;height:7px;border-radius:50%;background:#561930;opacity:0.18;transition:opacity 0.4s,background 0.5s;"></div>
    </div>

    <button id="rsp-btn" onclick="rspToggle()" style="margin-top:18px;font-family:'Raleway',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:#F7B8D0;background:#8A1B1A;border:none;padding:11px 32px;border-radius:100px;cursor:pointer;">Pause</button>

    <p style="font-size:10px;font-weight:300;letter-spacing:0.14em;color:#561930;opacity:0.4;margin-top:14px;margin-bottom:0;">Respiration carrée · 4 × 4 secondes</p>
  </div>
</div>

<script>
(function(){
  var PHASES=[
    {name:"Inspire", color:"#8A1B1A", dark:true},
    {name:"Bloque",  color:"#FFDE59", dark:false},
    {name:"Expire",  color:"#DC143C", dark:true},
    {name:"Bloque",  color:"#561930", dark:true}
  ];
  var DUR=4000, S=260, PAD=36, R=20, W=S-PAD*2;
  var cv=document.getElementById('rsp-cv');
  var ctx=cv.getContext('2d');
  var lbl=document.getElementById('phase-label');
  var num=document.getElementById('rsp-num');
  var btn=document.getElementById('rsp-btn');
  var dots=document.querySelectorAll('.rsp-dot');
  var start=null, paused=false, pauseAt=null, lastPh=-1;

  function pt(p){
    var straight=W-2*R, arc=Math.PI/2*R, seg=straight+arc, total=4*seg;
    var d=((p%1)+1)%1*total;
    var sides=[
      function(d){return [PAD+R+d, PAD]},
      function(d){return [PAD+W, PAD+R+d]},
      function(d){return [PAD+W-R-d, PAD+W]},
      function(d){return [PAD, PAD+W-R-d]}
    ];
    var ac=[
      function(a){return [PAD+W-R+Math.cos(a)*R, PAD+R+Math.sin(a)*R]},
      function(a){return [PAD+W-R+Math.cos(a)*R, PAD+W-R+Math.sin(a)*R]},
      function(a){return [PAD+R+Math.cos(a)*R, PAD+W-R+Math.sin(a)*R]},
      function(a){return [PAD+R+Math.cos(a)*R, PAD+R+Math.sin(a)*R]}
    ];
    var as=[-Math.PI/2, 0, Math.PI/2, Math.PI];
    for(var i=0;i<4;i++){
      if(d<straight) return sides[i](d);
      d-=straight;
      if(d<arc) return ac[i](as[i]+(d/arc)*(Math.PI/2));
      d-=arc;
    }
    return [PAD+R, PAD];
  }

  function rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

  function draw(ts){
    if(!start) start=ts;
    if(paused){requestAnimationFrame(draw);return;}
    var e=(ts-start)%(DUR*4), ph=Math.floor(e/DUR), prog=(e%DUR)/DUR, t=(ph+prog)/4;
    var phase=PHASES[ph];
    ctx.clearRect(0,0,S,S);
    ctx.beginPath();
    ctx.roundRect(PAD,PAD,W,W,R);
    ctx.strokeStyle='rgba(86,25,48,0.08)';
    ctx.lineWidth=2.5; ctx.stroke();
    var steps=80, tail=0.20, c=rgb(phase.color);
    for(var i=0;i<steps;i++){
      var p0=pt(t-(i/steps)*tail), p1=pt(t-((i+1)/steps)*tail);
      var alpha=Math.pow(1-i/steps,1.6)*0.95, lw=3.8*Math.pow(1-i/steps,0.5);
      ctx.beginPath(); ctx.moveTo(p0[0],p0[1]); ctx.lineTo(p1[0],p1[1]);
      ctx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+alpha+')';
      ctx.lineWidth=lw; ctx.lineCap='round'; ctx.stroke();
    }
    var sec=4-Math.floor(prog*4);
    if(num.textContent!=sec) num.textContent=sec;
    if(lastPh!==ph){
      lbl.textContent=phase.name; lbl.style.color=phase.color;
      num.style.color=phase.color;
      btn.style.background=phase.color;
      btn.style.color=phase.dark?'#F7B8D0':'#8A1B1A';
      dots.forEach(function(d,i){
        d.style.opacity=(i===ph)?'1':'0.18';
        d.style.background=PHASES[i].color;
      });
      lastPh=ph;
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  window.rspToggle=function(){
    paused=!paused;
    btn.textContent=paused?'Reprendre':'Pause';
    if(!paused) start+=performance.now()-pauseAt;
    else pauseAt=performance.now();
  };
})();
</script>
