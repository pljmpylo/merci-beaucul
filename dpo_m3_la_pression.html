<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>La pression</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>@import url("https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;600&display=swap");</style>
<style>
  :root{
    --bg:#FFFAFD;--ink:#450100;--ink-2:#561930;
    --crimson:#8A1B1A;--red:#DC143C;--plum:#561930;
    --pink:#F7B8D0;--yellow:#FFDE59;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Raleway',sans-serif;color:var(--ink);}
  body{margin:0;padding:16px 0;}
  .card{
    width:min(1100px,100%);background:var(--bg);border-radius:24px;
    
  }
  .scene{position:relative;width:100%;aspect-ratio:1000/460;}
  .scene svg{width:100%;height:100%;display:block;overflow:visible}
  .caption{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
    margin-top:24px;text-align:center;
  }
  .caption div{font-size:14px;font-weight:400;color:var(--ink);letter-spacing:.02em;}
  .caption .s{
    display:block;font-size:10px;font-weight:400;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-2);opacity:.55;margin-top:3px;
  }
  .finger{animation:press 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center top;}
  .f1{--d:3px;animation-delay:0s}
  .f2{--d:8px;animation-delay:.25s}
  .f3{--d:14px;animation-delay:.5s}
  .f4{--d:22px;animation-delay:.75s}
  @keyframes press{0%,100%{transform:translateY(0)}50%{transform:translateY(var(--d))}}

  .blush{animation:blushPulse 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
  .b1{animation-delay:0s}.b2{animation-delay:.25s}.b3{animation-delay:.5s}.b4{animation-delay:.75s}
  @keyframes blushPulse{
    0%,100%{opacity:0;transform:scale(.4)}
    45%,55%{opacity:1;transform:scale(1)}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="scene">
      <svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="grain">
            <feTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="2" seed="3"/>
            <feColorMatrix values="0 0 0 0 0.54  0 0 0 0 0.10  0 0 0 0 0.19  0 0 0 0.35 0"/>
            <feComposite in2="SourceGraphic" operator="in"/>
          </filter>
          <linearGradient id="fingerFill" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#FFFAFD"/>
            <stop offset="1" stop-color="#fbe8ee"/>
          </linearGradient>
          <radialGradient id="blushGrad" cx=".5" cy=".5" r=".5">
            <stop offset="0" stop-color="#DC143C" stop-opacity=".9"/>
            <stop offset=".5" stop-color="#F7B8D0" stop-opacity=".5"/>
            <stop offset="1" stop-color="#F7B8D0" stop-opacity="0"/>
          </radialGradient>

          <!-- narrower finger with oval nail -->
          <symbol id="finger" viewBox="-40 -10 80 290" overflow="visible">
            <path d="M-32,-10 L -32,220 Q -32,256 0,258 Q 32,256 32,220 L 32,-10 Z"
                  fill="url(#fingerFill)" stroke="#8A1B1A" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M-32,-10 L -32,220 Q -32,256 0,258 Q 32,256 32,220 L 32,-10 Z"
                  fill="#8A1B1A" opacity=".16" filter="url(#grain)"/>
            <path d="M-30,10 Q -26,90 -28,210 Q -26,246 -4,254" stroke="#8A1B1A" stroke-width=".5" fill="none" opacity=".25"/>
            <path d="M30,10 Q 26,90 28,210 Q 26,246 4,254" stroke="#8A1B1A" stroke-width=".5" fill="none" opacity=".25"/>
            <ellipse cx="0" cy="208" rx="16" ry="26" fill="none" stroke="#8A1B1A" stroke-width="1.2"/>
            <path d="M-4,40 q 5,-3 8,2 q -8,3 -3,-5" stroke="#8A1B1A" stroke-width=".9" fill="none"/>
          </symbol>
        </defs>

        <!-- THREE SKIN LAYERS in user palette -->
        <g>
          <rect x="0" y="288" width="1000" height="8" fill="#F7B8D0"/>
          <rect x="0" y="288" width="1000" height="8" fill="#DC143C" opacity=".35" filter="url(#grain)"/>
        </g>
        <g>
          <rect x="0" y="306" width="1000" height="14" fill="#DC143C" opacity=".7"/>
          <rect x="0" y="306" width="1000" height="14" fill="#8A1B1A" opacity=".35" filter="url(#grain)"/>
        </g>
        <g>
          <rect x="0" y="328" width="1000" height="22" fill="#e8cdb0"/>
          <rect x="0" y="328" width="1000" height="22" fill="#a07a55" opacity=".35" filter="url(#grain)"/>
        </g>

        <!-- Finger 1 -->
        <g class="finger f1"><use href="#finger" x="200" y="20" width="80" height="290"/></g>
        <g class="blush b1"><ellipse cx="240" cy="292" rx="30" ry="8" fill="url(#blushGrad)"/></g>

        <!-- Finger 2 -->
        <g class="finger f2"><use href="#finger" x="400" y="20" width="80" height="290"/></g>
        <g class="blush b2"><ellipse cx="440" cy="310" rx="38" ry="13" fill="url(#blushGrad)"/></g>

        <!-- Finger 3 -->
        <g class="finger f3"><use href="#finger" x="600" y="20" width="80" height="290"/></g>
        <g class="blush b3"><ellipse cx="640" cy="332" rx="44" ry="18" fill="url(#blushGrad)"/></g>

        <!-- Finger 4 -->
        <g class="finger f4"><use href="#finger" x="800" y="20" width="80" height="290"/></g>
        <g class="blush b4">
          <ellipse cx="840" cy="342" rx="36" ry="22" fill="url(#blushGrad)"/>
          <ellipse cx="840" cy="342" rx="12" ry="9" fill="#DC143C" opacity=".8"/>
        </g>

        <!-- subtle skin dents -->
        <g opacity=".45" stroke="#561930" stroke-width=".6" fill="none">
          <path d="M220,292 Q 240,292 260,292"/>
          <path d="M412,310 Q 440,314 468,310"/>
          <path d="M600,332 Q 640,342 680,332"/>
          <path d="M812,344 Q 840,358 868,344"/>
        </g>
      </svg>
    </div>

    <div class="caption">
      <div>Frôler<span class="s">à peine</span></div>
      <div>Toucher<span class="s">posé</span></div>
      <div>Masser<span class="s">en appui</span></div>
      <div>+ de pression<span class="s">à un endroit</span></div>
    </div>
  </div>
<script>function sendHeight(){window.parent.postMessage({iframeHeight:document.body.scrollHeight},"*");}window.addEventListener("load",function(){sendHeight();new MutationObserver(sendHeight).observe(document.body,{childList:true,subtree:true,attributes:true});});</script>
</body>
</html>
