  }

    align-items: center;
    font-size: 11px;
    font-weight: 700;
    color: #8A1B1A;
    letter-spacing: 1.5px;

  }

  }

    gap: 12px;

    background: #fff;

  }

    background: #FFF5F5;
    box-shadow: 0 2px 8px rgba(138, 27, 26, 0.1);
  }
  .opt-letter {

    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #FFFAFD;
    border: 1.5px solid #E8D5D5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: #8A1B1A;
    transition: all 0.2s ease;
  }
  .opt.selected .opt-letter {
    background: #8A1B1A;
    border-color: #8A1B1A;
    color: #fff;
  }
  .opt-text { flex: 1; padding-top: 1px; }

  /* ── Navigation ───────────────────── */

    justify-content: flex-start;
    align-items: center;
    margin-top: 18px;
  }
  .btn {

    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 22px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-back {
    background: transparent;
    color: #8A1B1A;
    border: 1.5px solid #E8D5D5;
  }
  .btn-back:hover:not(:disabled) {
    background: #FFFAFD;
    border-color: #8A1B1A;
  }
  .btn-back:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .btn-next {
    background: #8A1B1A;
    color: #fff;
    margin-left: auto;
  }
  .btn-next:hover:not(:disabled) {
    background: #450100;
    transform: translateY(-1px);
  }
  .btn-next:disabled {
    opacity: 0.4;

  }

  /* ── Results ──────────────────────── */

  .result-tag {

    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2.5px;

    color: #8A1B1A;
    background: #FFFAFD;

    margin-bottom: 12px;
  }
  .result-title {
    font-size: 20px;
    font-weight: 800;
    color: #450100;

    border: 1.5px solid #E8D5D5;

    margin-bottom: 14px;

  .score-letter {

    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 11px;

    border: 1.5px solid #E8D5D5;
    color: #8A1B1A;

    color: #fff;

  }

  }

  }
  .score-num {
    width: 32px;
    text-align: right;
    font-weight: 700;
    color: #450100;
    flex-shrink: 0;
  }

  /* Profile card */
  .profile-card {
    background: #FFF5F5;
    border: 1.5px solid #E8D5D5;
    border-radius: 18px;
    padding: 22px 20px;
    margin-bottom: 20px;

  .profile-label {

    font-weight: 800;

    text-transform: uppercase;

    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 22px;
    border-radius: 999px;
    text-decoration: none;

  }
  .profile-cta-secondary {
    background: #fff;
    color: #8A1B1A;
    border: 1.5px solid #E8D5D5;
  }
  .profile-cta-secondary:hover {
    border-color: #8A1B1A;
    background: #FFFAFD;
    transform: translateY(-1px);
  }

  .restart {
    display: block;
    margin: 18px auto 0;
    background: transparent;
    color: #8A1B1A;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 18px;
    border: 1.5px solid #E8D5D5;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Raleway', sans-serif;
    transition: all 0.2s ease;
  }
  .restart:hover {
    background: #FFFAFD;
    border-color: #8A1B1A;
  }

  @media (max-width: 520px) {
    .quiz-wrap { padding: 22px 16px; border-radius: 18px; }
    .quiz-title { font-size: 19px; }
    .q-text { font-size: 15px; }
    .opt { font-size: 13.5px; padding: 12px 14px; }
    .btn { font-size: 12px; padding: 11px 18px; }
    .profile-name { font-size: 16px; }
    .profile-desc { font-size: 13.5px; }
  }
</style>
</head>
<body>

  <!-- ── Navigation (back only — auto-advance on select) ─── -->
  <div class="nav" id="nav">
    <button class="btn btn-back" id="btnBack" disabled>← Précédent</button>
  </div>

  <!-- ── Results ────────────────────── -->
  <div class="results" id="results">

    <div class="score-bars">

    <div id="profileCards"></div>

    <button class="restart" id="btnRestart">↻ Refaire le quiz</button>
  </div>

</div>

// ── Profils (TODO : remplacer X par les vraies stats communauté MBCL) ──
const PROFILES = {
  A: {
    name: "Profil A",
    desc: "Ton frein principal tourne autour de la <strong>peur / insécurité</strong> : peur d'être jugé·e, pas assez, pas safe, pas désirable. Ton corps se met en retrait parce qu'il cherche à te protéger du regard de l'autre.",
    stat: "X personnes interrogées chez MBCL ont ce frein.",
    cta: "Voir les propositions d'exercices pour le Profil A",
    link: "https://app.mercibeaucul.fr/products/developper-son-potentiel-orgasmique/categories/2159907000/posts/2196755849"
  },
  B: {
    name: "Profil B",
    desc: "Ton frein vient surtout de la <strong>charge mentale</strong> : ta tête tourne à plein régime et tu as du mal à en sortir, même pendant le sexe. Ton corps attend, mais ton cerveau ne lâche pas.",
    stat: "X personnes interrogées chez MBCL ont ce frein.",
    cta: "Voir les propositions d'exercices pour le Profil B",

  },
  C: {
    name: "Profil C",
    desc: "Ton frein est lié aux <strong>conditionnements et injonctions</strong> : les \"il faut\", la performance, le modèle de sexualité \"comme il faut\". Tu joues un rôle plus que tu ne ressens.",
    stat: "X personnes interrogées chez MBCL ont ce frein.",
    cta: "Voir les propositions d'exercices pour le Profil C",
    link: "https://app.mercibeaucul.fr/products/developper-son-potentiel-orgasmique/categories/2159907000/posts/2196755855"
  },
  D: {
    name: "Profil D",
    desc: "Ton frein est du côté des <strong>traumas / système nerveux en mode protection</strong> : freeze, coupure, alerte, malaise fort. Ton corps a appris à se protéger et continue de le faire, même quand le contexte est safe.",
    stat: "X personnes interrogées chez MBCL ont ce frein.",
    cta: "Voir les propositions d'exercices pour le Profil D",
    link: "https://app.mercibeaucul.fr/products/developper-son-potentiel-orgasmique/categories/2159907000/posts/2196755860"
  },
  E: {
    name: "Profil Neuroatypique",
    desc: "Ton frein se situe du côté de la <strong>neuroatypie</strong> : ton système nerveux, ta gestion sensorielle ou ton traitement de l'info font que le lâcher prise \"taille unique\" ne marche pas pour toi. Tu as besoin d'un mode d'emploi plus précis et ajusté à ton fonctionnement.",
    stat: "X personnes interrogées chez MBCL ont ce frein.",
    cta: "Voir les propositions d'exercices pour le Profil Neuroatypique",

};

// ── State ────────────────────────────────────────────
let currentQ = 0;
const answers = new Array(QUESTIONS.length).fill(null);

// ── DOM refs ────────────────────────────────────────
const questionsEl = document.getElementById('questions');
const progressText = document.getElementById('progressText');
const progressPct = document.getElementById('progressPct');
const progressFill = document.getElementById('progressFill');
const btnBack = document.getElementById('btnBack');
const resultsEl = document.getElementById('results');
const navEl = document.getElementById('nav');
const progressWrap = document.getElementById('progressWrap');

// Lock pour éviter les doubles clics pendant la transition
let advancing = false;

// ── Build questions ──────────────────────────────────
QUESTIONS.forEach((q, qi) => {
  const div = document.createElement('div');
  div.className = 'question' + (qi === 0 ? ' active' : '');
  div.dataset.q = qi;

  const qText = document.createElement('div');
  qText.className = 'q-text';
  qText.innerHTML = q.intro;
  div.appendChild(qText);

  const optsWrap = document.createElement('div');
  optsWrap.className = 'options';
  q.options.forEach((opt) => {
    const o = document.createElement('div');
    o.className = 'opt';
    o.dataset.letter = opt.l;
    o.innerHTML = '<div class="opt-letter">' + opt.l + '</div><div class="opt-text">' + opt.t + '</div>';
    o.addEventListener('click', () => selectOption(qi, opt.l, o));
    optsWrap.appendChild(o);
  });
  div.appendChild(optsWrap);

  questionsEl.appendChild(div);
});

function selectOption(qi, letter, el) {
  if (advancing) return;
  answers[qi] = letter;
  el.parentElement.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');

  // Auto-avance : petite pause pour que l'utilisateur voie sa sélection se cocher
  advancing = true;
  setTimeout(() => {
    advancing = false;
    if (currentQ < QUESTIONS.length - 1) {
      showQuestion(currentQ + 1);
    } else {
      showResults();
    }
  }, 350);
}

function showQuestion(index) {
  document.querySelectorAll('.question').forEach((q, i) => {
    q.classList.toggle('active', i === index);
  });
  currentQ = index;
  updateProgress();
  btnBack.disabled = index === 0;
  // Restaure la sélection visuelle si on revient en arrière
  const activeQ = document.querySelectorAll('.question')[index];
  if (activeQ && answers[index]) {
    activeQ.querySelectorAll('.opt').forEach(o => {
      o.classList.toggle('selected', o.dataset.letter === answers[index]);
    });
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const pct = Math.round(((currentQ + 1) / QUESTIONS.length) * 100);
  progressText.textContent = 'Question ' + (currentQ + 1) + ' / ' + QUESTIONS.length;
  progressPct.textContent = pct + '%';
  progressFill.style.width = pct + '%';
}

btnBack.addEventListener('click', () => {
  if (currentQ > 0) showQuestion(currentQ - 1);
});

// ── Results ─────────────────────────────────────────
function showResults() {
  // Score
  const scores = { A: 0, B: 0, C: 0, D: 0, E: 0 };
  answers.forEach(a => { if (a) scores[a]++; });

  // Find dominant letter(s)
  let max = 0, dominant = [];
  Object.keys(scores).forEach(l => {
    if (scores[l] > max) { max = scores[l]; dominant = [l]; }
    else if (scores[l] === max) { dominant.push(l); }
  });

  // Build score bars
  const scoreBars = document.getElementById('scoreBars');
  scoreBars.innerHTML = '';
  ['A', 'B', 'C', 'D', 'E'].forEach(l => {
    const isDom = dominant.includes(l);
    const pct = Math.round((scores[l] / QUESTIONS.length) * 100);
    const row = document.createElement('div');
    row.className = 'score-row' + (isDom ? ' dominant' : '');
    row.innerHTML =
      '<div class="score-letter">' + l + '</div>' +
      '<div class="score-bar-bg"><div class="score-bar-fill" style="width:0%"></div></div>' +
      '<div class="score-num">' + scores[l] + '</div>';
    scoreBars.appendChild(row);
    setTimeout(() => {
      row.querySelector('.score-bar-fill').style.width = pct + '%';
    }, 100);
  });

  // Build profile cards (show all dominant profiles in case of tie)
  const profileCards = document.getElementById('profileCards');
  profileCards.innerHTML = '';
  dominant.forEach(l => {
    const p = PROFILES[l];
    const card = document.createElement('div');
    card.className = 'profile-card';
    const exAequoBadge = dominant.length > 1
      ? '<div class="profile-label">✦ Ex æquo</div>'
      : '<div class="profile-label">🎯 Ton frein principal</div>';
    let html =
      exAequoBadge +
      '<div class="profile-name">' + p.name + '</div>' +
      '<div class="profile-desc">' + p.desc + '</div>';
    if (p.stat) html += '<div class="community-stat">' + p.stat + '</div>';
    html += '<div class="profile-ctas">' +
              '<a href="' + p.link + '" class="profile-cta" target="_top">' + p.cta + '</a>' +
              '<a href="https://app.mercibeaucul.fr/products/developper-son-potentiel-orgasmique/categories/2159907000/posts/2196754830" class="profile-cta-secondary" target="_top">Voir les exercices pour lâcher prise</a>' +
            '</div>';
    card.innerHTML = html;
    profileCards.appendChild(card);
  });

  // Hide quiz, show results
  questionsEl.style.display = 'none';
  navEl.style.display = 'none';
  progressWrap.style.display = 'none';
  resultsEl.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('btnRestart').addEventListener('click', () => {
  answers.fill(null);
  currentQ = 0;
  document.querySelectorAll('.opt.selected').forEach(o => o.classList.remove('selected'));
  questionsEl.style.display = '';
  navEl.style.display = '';
  progressWrap.style.display = '';
  resultsEl.classList.remove('active');
  showQuestion(0);
});

// Init
updateProgress();
</script>
